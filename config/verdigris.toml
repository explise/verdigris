# Verdigris configuration — default profile.
#
# Out of the box this runs FULLY OFFLINE: logs land on the local filesystem,
# queries are modeled. Switch `backend` to "s3" to point at real S3 or a local
# MinIO; nothing else in the binary changes.

[storage]
backend = "local"
path = "./data"

# --- S3 / MinIO example (uncomment and set backend = "s3") -------------------
# backend = "s3"
# bucket = "verdigris"
# region = "us-east-1"
# endpoint = "http://localhost:9000"   # MinIO; omit for real AWS S3
# allow_http = true                    # MinIO over plain HTTP
# access_key_id = "minioadmin"         # or leave unset to use AWS env/profile
# secret_access_key = "minioadmin"
# prefix = ""

[query]
# Query speed is a provisioned dial, decoupled from storage.
#
# `modeled_mibps_per_core` is MiB of *stored Parquet* per second per core — it
# divides `ScanPlan::total_bytes()` in `ModeledExecutor`. Measured, not guessed:
# see `docs/load-test.md`. DataFusion over MinIO at 8 cores sustained 892 MiB/s
# on a 4-column scan and 635 MiB/s on a full-projection aggregate, i.e. 79-111
# MiB/s/core; 100 is the round number in that band. The previous value of 250 was
# a placeholder and only a metadata-only COUNT(*) (which reads no column data)
# ever reached it.
#
# Still optimistic in one direction: measured against local MinIO, so it carries
# no real-S3 first-byte latency. Treat it as the CPU-side decode ceiling.
modeled_mibps_per_core = 100.0
cores = 4

# Severity-based write-time routing: which tier each level lands in.
# Severity decides placement (prefix / storage class), never price.
[routing]
error = "hot"
warn = "warm"
info = "warm"
debug = "cold"

# Age-based lifecycle: rendered into an S3 lifecycle policy (`vdg lifecycle`).
[lifecycle]
hot_to_warm_days = 3
warm_to_cold_days = 30
expire_days = 400
