# MkDocs Material config for the Verdigris documentation site.
#
# The docs source lives in docs/ with the code so it never drifts. CI deploys
# the site to https://explise.github.io/verdigris/ on every push to main that
# touches docs/ or this file (.github/workflows/docs.yml) — no manual publish.
# Local preview: mkdocs serve
site_name: Verdigris
site_description: >-
  S3-native log storage and query engine in Rust: compacted Parquet in the
  operator's own bucket, queried in place with DataFusion, with a sans-I/O
  control plane built for deterministic simulation testing.
site_url: https://explise.github.io/verdigris/
docs_dir: docs
site_dir: site

repo_url: https://github.com/explise/verdigris
repo_name: explise/verdigris

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    # Light "warm paper" scheme; exact brand hues come from CSS overriding
    # --md-primary-fg-color / --md-accent-fg-color in stylesheets/extra.css.
    scheme: default
    primary: teal
    accent: teal
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: material/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets

# Don't fail the build on cross-links that point at repo files not in the site.
validation:
  links:
    absolute_links: ignore
    unrecognized_links: ignore

nav:
  - Home: index.md
  - Internals:
      - Architecture: ARCHITECTURE.md
      - Testing (DST): dst-architecture.md
      - Decision Records:
          - Overview: adr/README.md
          - "ADR-0002 · Manifest as Iceberg stand-in": adr/0002-manifest-as-iceberg-standin.md
          - "ADR-0003 · Ingest / query role split": adr/0003-ingest-query-role-split.md
      - Deployment (chart internals): deployment.md
  - Reference:
      - HTTP API: API.md
      - Configuration: configuration.md
  - Running it:
      - Quickstart: getting-started.md
      - Install on EKS: install.md
      - Sending logs: sending-logs.md
      - Querying: querying.md
      - Cost & tiering: cost.md
  - FAQ: faq.md
  - Contributing: contributing.md
