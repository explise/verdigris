# The frontend gate: typecheck + production build for web/ (the shipping UI),
# and the offline render-verify script for frontend/ (the reference prototype).
name: web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "frontend/**"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "web/**"
      - "frontend/**"
      - ".github/workflows/web.yml"

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  # The prototype is dependency-free by design: plain node, no install step.
  prototype:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node frontend/_verify.js
