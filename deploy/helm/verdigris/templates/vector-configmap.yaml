{{- if .Values.vector.enabled }}
{{- $sink := .Values.vector.sinkEndpoint | default (printf "http://%s:%v/v1/ingest" (include "verdigris.fullname" .) (.Values.service.port | int)) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "verdigris.fullname" . }}-vector
  labels:
    {{- include "verdigris.labels" . | nindent 4 }}
    app.kubernetes.io/component: log-shipper
data:
  vector.yaml: |
    # Tails every pod's stdout/stderr, reshapes into the Verdigris ingest wire
    # format, and batches NDJSON to POST /v1/ingest.
    data_dir: /vector-data-dir
    sources:
      k8s:
        type: kubernetes_logs

    transforms:
      to_verdigris:
        type: remap
        inputs: [k8s]
        # Emit exactly the ingest wire schema (verdigris_ingest::wire::JsonLog):
        #   ts_millis (i64), level (str, parsed case-insensitively server-side),
        #   service (str), status (int, optional), message (str),
        #   trace_id (str, optional), attrs (map<str,str>, optional).
        source: |
          ts = to_unix_timestamp(.timestamp, unit: "milliseconds") ?? to_unix_timestamp(now(), unit: "milliseconds")
          . = {
            "ts_millis": ts,
            "level": to_string(.level) ?? "info",
            "service": to_string(.kubernetes.container_name) ?? "unknown",
            "message": to_string(.message) ?? "",
            "trace_id": to_string(.trace_id) ?? "",
            "attrs": {
              "namespace": to_string(.kubernetes.pod_namespace) ?? "",
              "pod": to_string(.kubernetes.pod_name) ?? "",
              "node": to_string(.kubernetes.pod_node_name) ?? ""
            }
          }

    sinks:
      verdigris:
        type: http
        inputs: [to_verdigris]
        uri: {{ $sink | quote }}
        method: post
        encoding:
          codec: json          # newline-delimited JSON batches (NDJSON)
        framing:
          method: newline_delimited
        batch:
          max_events: 1000
          timeout_secs: 5
        request:
          retry_attempts: 5
{{- end }}
