{{- if and .Values.seed.enabled (eq .Values.storage.backend "s3") }}
# S3 backend: seed runs once as a post-install/upgrade hook (the serve pods are
# stateless and read from the bucket, so seeding can't ride along as an
# initContainer the way it does for the local backend).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "verdigris.fullname" . }}-seed
  labels:
    {{- include "verdigris.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "verdigris.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "verdigris.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: seed
          image: {{ include "verdigris.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              if vdg manifest --table {{ .Values.table | quote }} >/dev/null 2>&1; then
                echo "table {{ .Values.table }} already seeded in bucket — skipping";
              else
                echo "seeding {{ .Values.seed.records }} synthetic records into {{ .Values.table }}";
                vdg ingest --table {{ .Values.table | quote }} --generate {{ .Values.seed.records }};
              fi
          env:
            - name: VERDIGRIS_CONFIG
              value: /etc/verdigris/verdigris.toml
            {{- with .Values.storage.s3.region }}
            - name: AWS_REGION
              value: {{ . | quote }}
            {{- end }}
            {{- if and (not .Values.storage.s3.existingSecret) .Values.storage.s3.accessKeyId }}
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.storage.s3.accessKeyId | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.storage.s3.secretAccessKey | quote }}
            {{- end }}
          {{- if .Values.storage.s3.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.storage.s3.existingSecret }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/verdigris
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "verdigris.fullname" . }}-config
{{- end }}
