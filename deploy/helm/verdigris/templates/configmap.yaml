apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "verdigris.fullname" . }}-config
  labels:
    {{- include "verdigris.labels" . | nindent 4 }}
data:
  verdigris.toml: |
    # Rendered by the Verdigris Helm chart. Do not edit in-cluster; change values.yaml.
    [storage]
    {{- if eq .Values.storage.backend "s3" }}
    {{- if not .Values.storage.s3.bucket }}
    {{- fail "storage.backend=s3 requires storage.s3.bucket" }}
    {{- end }}
    backend = "s3"
    bucket = {{ .Values.storage.s3.bucket | quote }}
    {{- with .Values.storage.s3.region }}
    region = {{ . | quote }}
    {{- end }}
    {{- with .Values.storage.s3.endpoint }}
    endpoint = {{ . | quote }}
    {{- end }}
    {{- if .Values.storage.s3.allowHttp }}
    allow_http = true
    {{- end }}
    {{- with .Values.storage.s3.prefix }}
    prefix = {{ . | quote }}
    {{- end }}
    # Credentials are NOT rendered here — they come from the pod environment
    # (IRSA web-identity, or the {{ .Values.storage.s3.existingSecret | default "*" }} secret via env),
    # picked up by AmazonS3Builder::from_env().
    {{- else }}
    backend = "local"
    path = {{ .Values.storage.localPath | quote }}
    {{- end }}

    [query]
    modeled_mibps_per_core = {{ .Values.query.modeledMibpsPerCore }}
    cores = {{ .Values.query.cores }}

    [routing]
    error = {{ .Values.routing.error | quote }}
    warn = {{ .Values.routing.warn | quote }}
    info = {{ .Values.routing.info | quote }}
    debug = {{ .Values.routing.debug | quote }}

    [lifecycle]
    hot_to_warm_days = {{ .Values.lifecycle.hotToWarmDays }}
    warm_to_cold_days = {{ .Values.lifecycle.warmToColdDays }}
    expire_days = {{ .Values.lifecycle.expireDays }}
