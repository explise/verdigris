{{- if .Values.vector.enabled }}
# =============================================================================
# SCAFFOLD — Vector log-shipping DaemonSet.
#
# This is the "step 1" ingestion path from the architecture diagram: a Vector
# DaemonSet tails every pod's stdout/stderr and ships to the Verdigris ingest
# service. It is DISABLED by default (vector.enabled=false) because the HTTP
# ingest endpoint it targets does NOT exist yet — vdg ingest is currently
# CLI-only (synthetic generator + NDJSON file). When `/v1/ingest` lands, set
# vector.sinkEndpoint and flip vector.enabled=true. Until then this ships logs
# nowhere useful; it exists as the deployment wiring, ready to activate.
# =============================================================================
{{- if not .Values.vector.sinkEndpoint }}
{{- fail "vector.enabled=true requires vector.sinkEndpoint — but note the Verdigris HTTP ingest endpoint is not built yet (see this template's header)." }}
{{- end }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "verdigris.fullname" . }}-vector
  labels:
    {{- include "verdigris.labels" . | nindent 4 }}
    app.kubernetes.io/component: log-shipper
spec:
  selector:
    matchLabels:
      {{- include "verdigris.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: log-shipper
  template:
    metadata:
      annotations:
        checksum/vector-config: {{ include (print $.Template.BasePath "/vector-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "verdigris.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: log-shipper
    spec:
      serviceAccountName: {{ include "verdigris.serviceAccountName" . }}
      tolerations:
        # Ship logs from every node, including control-plane/tainted nodes.
        - operator: Exists
      containers:
        - name: vector
          image: {{ .Values.vector.image }}
          args: ["--config", "/etc/vector/vector.yaml"]
          env:
            - name: VECTOR_LOG
              value: info
          volumeMounts:
            - name: vector-config
              mountPath: /etc/vector
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: vector-config
          configMap:
            name: {{ include "verdigris.fullname" . }}-vector
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
{{- end }}
