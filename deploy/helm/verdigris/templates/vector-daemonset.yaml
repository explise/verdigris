{{- if .Values.vector.enabled }}
# =============================================================================
# Vector log-shipping DaemonSet — the "step 1" ingestion path.
#
# Tails every pod's stdout/stderr and ships batched NDJSON to the Verdigris
# `POST /v1/ingest` endpoint. Opt-in (vector.enabled=false by default) since
# log shipping is a deployment choice. When sinkEndpoint is unset it defaults to
# the in-cluster serve Service, so a bare `--set vector.enabled=true` works.
# =============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "verdigris.fullname" . }}-vector
  labels:
    {{- include "verdigris.labels" . | nindent 4 }}
    app.kubernetes.io/component: log-shipper
spec:
  selector:
    matchLabels:
      {{- include "verdigris.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: log-shipper
  template:
    metadata:
      annotations:
        checksum/vector-config: {{ include (print $.Template.BasePath "/vector-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "verdigris.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: log-shipper
    spec:
      serviceAccountName: {{ include "verdigris.serviceAccountName" . }}
      tolerations:
        # Ship logs from every node, including control-plane/tainted nodes.
        - operator: Exists
      containers:
        - name: vector
          image: {{ .Values.vector.image }}
          args: ["--config", "/etc/vector/vector.yaml"]
          env:
            - name: VECTOR_LOG
              value: info
          volumeMounts:
            - name: vector-config
              mountPath: /etc/vector
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: vector-config
          configMap:
            name: {{ include "verdigris.fullname" . }}-vector
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
{{- end }}
