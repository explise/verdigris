<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-label="Verdigris architecture: pods on EKS send logs through Vector, Fluent Bit or an OpenTelemetry Collector into Verdigris ingest, which writes tiered Parquet to your own S3 bucket; the DataFusion query engine reads it in place — no rehydration — and serves the API, web UI and Grafana.">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2c9d85"/>
    </marker>
    <marker id="arrBright" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#46c9ab"/>
    </marker>
    <marker id="arrWarm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#61776e"/>
    </marker>
  </defs>

  <style>
    text { font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .title { fill: #e9efea; font-size: 14.5px; font-weight: 600; }
    .brand { fill: #46c9ab; font-size: 14.5px; font-weight: 700; }
    .sub   { fill: #93a89e; font-size: 11.5px; }
    .faint { fill: #61776e; font-size: 10.5px; }
    .pill  { fill: #6fded8; font-size: 11px; font-weight: 600; }
    .pillWarm { fill: #dca041; font-size: 11px; font-weight: 600; }
    .node  { fill: #141b18; stroke: #26332d; stroke-width: 1.2; }
    .nodeBrand { fill: #0f1d18; stroke: #2c9d85; stroke-width: 1.2; }
    .flow  { stroke: #2c9d85; stroke-width: 1.6; fill: none; }
    .flowDash { stroke: #46c9ab; stroke-width: 1.8; stroke-dasharray: 5 5; fill: none; }
    .age   { stroke: #61776e; stroke-width: 1.3; fill: none; }
  </style>

  <!-- card -->
  <rect x="1.5" y="1.5" width="897" height="697" rx="18" fill="#0b0e0d" stroke="#26332d" stroke-width="1.5"/>

  <!-- ── pods ─────────────────────────────────────────── -->
  <rect class="node" x="290" y="36" width="320" height="58" rx="10"/>
  <text class="title" x="450" y="61" text-anchor="middle">your pods on EKS</text>
  <text class="sub"   x="450" y="80" text-anchor="middle">stdout / stderr &#183; OTLP</text>

  <line class="flow" x1="410" y1="94" x2="310" y2="136" marker-end="url(#arr)"/>
  <line class="flow" x1="490" y1="94" x2="590" y2="136" marker-end="url(#arr)"/>

  <!-- ── collectors ───────────────────────────────────── -->
  <rect class="node" x="150" y="138" width="270" height="58" rx="10"/>
  <text class="title" x="285" y="163" text-anchor="middle">Vector / Fluent Bit</text>
  <text class="sub"   x="285" y="182" text-anchor="middle">log DaemonSet</text>

  <rect class="node" x="480" y="138" width="270" height="58" rx="10"/>
  <text class="title" x="615" y="163" text-anchor="middle">OpenTelemetry Collector</text>
  <text class="sub"   x="615" y="182" text-anchor="middle">OTLP/HTTP logs</text>

  <line class="flow" x1="300" y1="196" x2="412" y2="240" marker-end="url(#arr)"/>
  <line class="flow" x1="600" y1="196" x2="488" y2="240" marker-end="url(#arr)"/>

  <!-- ── ingest ───────────────────────────────────────── -->
  <rect class="nodeBrand" x="240" y="242" width="420" height="62" rx="10"/>
  <text class="brand" x="450" y="267" text-anchor="middle">Verdigris ingest</text>
  <text class="sub"   x="450" y="286" text-anchor="middle">batch &#8594; zstd Parquet &#183; bloom filters &#183; CAS catalog commit</text>

  <line class="flow" x1="450" y1="304" x2="450" y2="340" marker-end="url(#arr)"/>
  <rect x="490" y="310" width="196" height="24" rx="12" fill="#0d3b32"/>
  <text class="pill" x="588" y="326" text-anchor="middle">no per-GB ingestion margin</text>

  <!-- ── S3 bucket ────────────────────────────────────── -->
  <rect x="110" y="344" width="680" height="150" rx="12" fill="#101513" stroke="#2e3a34" stroke-width="1.3"/>
  <text class="title" x="134" y="372" font-size="14px">Amazon S3 &#8212; <tspan fill="#46c9ab">your</tspan> bucket</text>
  <text class="faint" x="766" y="372" text-anchor="end">lifecycle rules age data &#8594;</text>

  <!-- hot -->
  <rect x="134" y="388" width="190" height="82" rx="9" fill="#14201c" stroke="#46c9ab" stroke-width="1.2"/>
  <text x="229" y="412" text-anchor="middle" fill="#46c9ab" font-size="13px" font-weight="700">hot</text>
  <text class="sub"   x="229" y="431" text-anchor="middle">S3 Standard</text>
  <text class="faint" x="229" y="449" text-anchor="middle">recent &#183; interactive</text>

  <line class="age" x1="330" y1="429" x2="349" y2="429" marker-end="url(#arrWarm)"/>
  <text class="faint" x="340" y="420" text-anchor="middle">3 d</text>

  <!-- warm -->
  <rect x="355" y="388" width="190" height="82" rx="9" fill="#1f1b12" stroke="#dca041" stroke-width="1.2"/>
  <text x="450" y="412" text-anchor="middle" fill="#dca041" font-size="13px" font-weight="700">warm</text>
  <text class="sub"   x="450" y="431" text-anchor="middle">Glacier Instant</text>
  <text class="faint" x="450" y="449" text-anchor="middle">queryable in place</text>

  <line class="age" x1="551" y1="429" x2="570" y2="429" marker-end="url(#arrWarm)"/>
  <text class="faint" x="561" y="420" text-anchor="middle">30 d</text>

  <!-- cold -->
  <rect x="576" y="388" width="190" height="82" rx="9" fill="#151a1e" stroke="#6b8f9e" stroke-width="1.2"/>
  <text x="671" y="412" text-anchor="middle" fill="#6b8f9e" font-size="13px" font-weight="700">cold</text>
  <text class="sub"   x="671" y="431" text-anchor="middle">Glacier Flexible</text>
  <text class="faint" x="671" y="449" text-anchor="middle">cheapest &#183; cost-gated</text>

  <!-- ── query in place ───────────────────────────────── -->
  <line class="flowDash" x1="450" y1="494" x2="450" y2="536" marker-end="url(#arrBright)"/>
  <rect x="486" y="502" width="238" height="24" rx="12" fill="#0d3b32"/>
  <text class="pill" x="605" y="518" text-anchor="middle">query in place &#8212; no rehydration, ever</text>
  <rect x="178" y="502" width="236" height="24" rx="12" fill="#241d10"/>
  <text class="pillWarm" x="296" y="518" text-anchor="middle">cost gate: ~GB &#183; ~$ before cold scans</text>

  <!-- ── query engine ─────────────────────────────────── -->
  <rect class="nodeBrand" x="240" y="538" width="420" height="62" rx="10"/>
  <text class="brand" x="450" y="563" text-anchor="middle">Verdigris query &#8212; Apache DataFusion</text>
  <text class="sub"   x="450" y="582" text-anchor="middle">SQL &#183; Arrow IPC &#183; tier / time / value-stat pruned scans</text>

  <line class="flow" x1="395" y1="600" x2="268" y2="630" marker-end="url(#arr)"/>
  <line class="flow" x1="450" y1="600" x2="450" y2="630" marker-end="url(#arr)"/>
  <line class="flow" x1="505" y1="600" x2="632" y2="630" marker-end="url(#arr)"/>

  <!-- ── consumers ────────────────────────────────────── -->
  <rect class="node" x="150" y="632" width="170" height="42" rx="9"/>
  <text class="title" x="235" y="658" text-anchor="middle" font-size="13px">Query API</text>

  <rect class="node" x="365" y="632" width="170" height="42" rx="9"/>
  <text class="title" x="450" y="658" text-anchor="middle" font-size="13px">Web UI</text>

  <rect class="node" x="580" y="632" width="170" height="42" rx="9"/>
  <text class="title" x="665" y="658" text-anchor="middle" font-size="13px">Grafana</text>
</svg>
