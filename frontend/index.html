<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Verdigris</title>
<link rel="icon" href="favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&display=swap" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <!-- ───────── Sidebar (static shell; router only swaps .view) ───────── -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none">
          <rect x="5"  y="7"   width="30"  height="6" rx="3"   fill="var(--brand-copper)"/>
          <rect x="38" y="6.5" width="5.5" height="7" rx="1.5" fill="var(--brand-copper)"/>
          <rect x="5"  y="17"  width="20"  height="6" rx="3"   fill="var(--brand-verd-1)"/>
          <rect x="5"  y="27"  width="28"  height="6" rx="3"   fill="var(--brand-verd-2)"/>
          <rect x="5"  y="37"  width="15"  height="6" rx="3"   fill="var(--brand-verd-3)"/>
        </svg>
      </div>
      <div>
        <div class="name"><span class="wm-a">verdi</span><span class="wm-b">gris</span></div>
        <button class="env" id="env-switch">prod-us-east-1 <span class="caret">▾</span></button>
      </div>
    </div>

    <nav class="nav" id="nav"><!-- built by app.js --></nav>

    <div class="sidebar-foot">
      <div class="bucket"><span class="dot"></span> s3://acme-logs-prod</div>
      <div class="bucket-sub">data never leaves your account</div>
    </div>
  </aside>

  <!-- ───────── Main view (router target) ───────── -->
  <main class="main" id="view"></main>
</div>

<!-- modal mount -->
<div class="scrim" id="scrim"></div>

<script src="api.js"></script>
<script src="charts.js"></script>
<script src="pages.js"></script>
<script src="app.js"></script>
</body>
</html>
